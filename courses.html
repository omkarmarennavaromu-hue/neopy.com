<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Neopy Courses | Python Learning Paths</title>
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Premium typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0b0b;
      color: #faf3e0;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    :root {
      --orange: #f97316;
      --orange-glow: rgba(249, 115, 22, 0.4);
      --dark-green: #1a3b2f;
      --deep-green: #0e2a21;
      --red-accent: #e63946;
      --grey-mid: #2c2c2c;
      --grey-soft: #3a3a3a;
      --dark-bg: #0c0b0b;
      --cream: #faf3e0;
      --card-bg: #181818;
      --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Header */
    .courses-header {
      text-align: center;
      padding: 2rem 0 1rem;
    }

    .logo-link {
      text-decoration: none;
    }

    .site-name {
      font-family: 'Space Grotesk', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--orange), #ffb347, var(--cream));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .page-title {
      font-size: 2rem;
      margin-top: 0.5rem;
      color: var(--cream);
    }

    /* Tabs */
    .tabs-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--card-bg);
      border: 1px solid rgba(249, 115, 22, 0.3);
      padding: 0.85rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: var(--transition-smooth);
      color: var(--cream);
      font-family: inherit;
    }

    .tab-btn i {
      margin-right: 8px;
      color: var(--orange);
    }

    .tab-btn.active {
      background: linear-gradient(95deg, var(--orange), #d9480f);
      color: #0c0b0b;
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.5);
    }

    .tab-btn.active i {
      color: #0c0b0b;
    }

    .tab-btn:hover:not(.active) {
      transform: translateY(-3px);
      border-color: var(--orange);
      background: rgba(249, 115, 22, 0.1);
    }

    /* Topics Grid */
    .topics-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      justify-content: center;
      margin: 2rem 0 3rem;
    }

    .topic-card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1.5rem;
      width: 280px;
      transition: var(--transition-smooth);
      border: 1px solid rgba(249, 115, 22, 0.2);
      position: relative;
      overflow: hidden;
    }

    .topic-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, var(--orange), var(--red-accent), var(--dark-green), var(--orange));
      border-radius: 1.5rem;
      opacity: 0;
      z-index: -1;
      transition: opacity 0.5s ease;
    }

    .topic-card:hover::before {
      opacity: 0.6;
    }

    .topic-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(249, 115, 22, 0.25);
      border-color: var(--orange);
    }

    .topic-icon {
      font-size: 2.2rem;
      color: var(--orange);
      margin-bottom: 1rem;
    }

    .topic-card h3 {
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
    }

    .topic-card p {
      color: #b8b2a8;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .topic-duration {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--orange);
      font-weight: 500;
    }

    /* Section Headers */
    .section-title {
      font-size: 1.8rem;
      margin: 2rem 0 1rem;
      color: var(--orange);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .projects-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      justify-content: center;
      margin-bottom: 4rem;
    }

    .project-card {
      background: linear-gradient(135deg, #1e2a2a, #111918);
      border-radius: 1.5rem;
      padding: 1.5rem;
      width: 300px;
      transition: var(--transition-smooth);
      border-left: 4px solid var(--orange);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 28px rgba(249, 115, 22, 0.2);
    }

    .project-card h4 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--cream);
    }

    .project-card p {
      color: #cbc3b0;
      font-size: 0.9rem;
    }

    .project-tech {
      display: inline-block;
      margin-top: 0.8rem;
      background: rgba(249, 115, 22, 0.2);
      padding: 0.25rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--orange);
    }

    /* AI Floating Button */
    .ai-fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: linear-gradient(135deg, var(--orange), #e63e11);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
      transition: var(--transition-smooth);
      z-index: 100;
      border: none;
    }

    .ai-fab i {
      font-size: 1.8rem;
      color: #0c0b0b;
    }

    .ai-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 28px rgba(249, 115, 22, 0.7);
    }

    /* Modal */
    .ai-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
    }

    .ai-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--card-bg);
      max-width: 500px;
      width: 90%;
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid var(--orange);
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .ai-modal.active .modal-content {
      transform: scale(1);
    }

    .modal-content h3 {
      color: var(--orange);
      margin-bottom: 1rem;
    }

    .modal-content p {
      margin-bottom: 1rem;
      color: var(--cream);
    }

    .close-modal {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--cream);
      transition: 0.2s;
    }

    .close-modal:hover {
      color: var(--orange);
    }

    .ai-response {
      background: #0f0f0f;
      padding: 1rem;
      border-radius: 1rem;
      margin: 1rem 0;
      border-left: 3px solid var(--orange);
      font-size: 0.9rem;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--orange);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--grey-mid);
      color: #7f8c8d;
      font-size: 0.8rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--grey-soft);
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 1.2rem;
      }
      .topic-card, .project-card {
        width: 100%;
        max-width: 320px;
      }
      .tab-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
      .site-name {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="courses-header">
    <a href="index.html" class="logo-link"><span class="site-name">Neopy</span></a>
    <h2 class="page-title"><i class="fas fa-book-open"></i> Python Learning Paths</h2>
  </div>

  <!-- Tabs for levels -->
  <div class="tabs-container">
    <button class="tab-btn active" data-level="beginner"><i class="fas fa-seedling"></i> Beginner</button>
    <button class="tab-btn" data-level="intermediate"><i class="fas fa-chart-line"></i> Intermediate</button>
    <button class="tab-btn" data-level="pro"><i class="fas fa-trophy"></i> Pro</button>
  </div>

  <!-- Dynamic Topics Container -->
  <div id="topicsContainer" class="topics-grid"></div>

  <!-- Sample Projects Section (dynamic but consistent across all levels? We'll show relevant projects per level) -->
  <div id="projectsSection">
    <div class="section-title"><i class="fas fa-laptop-code"></i> Sample Projects</div>
    <div id="projectsContainer" class="projects-grid"></div>
  </div>
</div>

<!-- AI Floating Button -->
<button class="ai-fab" id="aiFabBtn"><i class="fas fa-robot"></i></button>

<!-- AI Modal (loaded dynamically on click) -->
<div id="aiModal" class="ai-modal">
  <div class="modal-content">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <h3><i class="fas fa-brain"></i> Neopy AI Assistant</h3>
    <p>Ask me anything about Python, courses, or your learning path!</p>
    <div id="aiResponseArea" class="ai-response">
      <i class="fas fa-comment-dots"></i> Hello! I'm your AI mentor. Click the button below to get a smart suggestion.
    </div>
    <button id="askAIButton" style="background: var(--orange); border: none; padding: 0.8rem 1.5rem; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%;"><i class="fas fa-magic"></i> Get AI Recommendation</button>
    <p style="font-size: 0.7rem; margin-top: 1rem; text-align: center;">✨ AI loads on first click ✨</p>
  </div>
</div>

<footer>
  <p>© 2026 Neopy — Master Python from zero to AI engineer. <i class="fas fa-python"></i></p>
</footer>

<!-- External JS -->
<script src="courses.js"></script>

<!-- Inline JSON data simulation + dynamic loader + AI lazy loading -->
<script>
  // ----- JSON data simulation (beginner.json, intermediate.json, pro.json)
  // According to requirement, topics load dynamically from JSON files. We'll embed them as objects to simulate fetch.
  // In real scenario, these would be fetched via fetch(). We'll also keep a fallback.
  
  const jsonData = {
    beginner: {
      topics: [
        { icon: "fab fa-python", title: "Python Basics", desc: "Variables, data types, and first script.", duration: "2 hours" },
        { icon: "fas fa-code-branch", title: "Control Flow", desc: "If-else, loops, and logical operations.", duration: "3 hours" },
        { icon: "fas fa-list", title: "Data Structures", desc: "Lists, tuples, dicts, and sets mastery.", duration: "4 hours" },
        { icon: "fas fa-function", title: "Functions & Scope", desc: "Write reusable code with functions.", duration: "3 hours" }
      ],
      projects: [
        { name: "Calculator App", description: "Build a CLI calculator with arithmetic operations.", tech: "Python basics" },
        { name: "To-Do List Manager", description: "Create a task manager with file storage.", tech: "File I/O" }
      ]
    },
    intermediate: {
      topics: [
        { icon: "fas fa-cogs", title: "OOP Deep Dive", desc: "Classes, inheritance, magic methods.", duration: "5 hours" },
        { icon: "fas fa-plug", title: "APIs & Requests", desc: "Consume REST APIs, JSON handling.", duration: "4 hours" },
        { icon: "fas fa-database", title: "SQL & Databases", desc: "SQLite, PostgreSQL with Python.", duration: "5 hours" },
        { icon: "fas fa-chart-simple", title: "Data Analysis", desc: "Pandas & NumPy fundamentals.", duration: "6 hours" }
      ],
      projects: [
        { name: "Weather Dashboard", description: "Fetch live weather data from API.", tech: "Requests + API" },
        { name: "Blog API Backend", description: "Build a RESTful API with Flask.", tech: "Flask, REST" }
      ]
    },
    pro: {
      topics: [
        { icon: "fas fa-bolt", title: "Concurrency & Async", desc: "AsyncIO, threading, multiprocessing.", duration: "6 hours" },
        { icon: "fas fa-shield-alt", title: "Security & Auth", desc: "JWT, OAuth, secure coding.", duration: "5 hours" },
        { icon: "fas fa-brain", title: "ML Fundamentals", desc: "Scikit-learn, model deployment.", duration: "8 hours" },
        { icon: "fas fa-cloud", title: "Cloud Deployment", desc: "Docker, AWS Lambda, CI/CD.", duration: "7 hours" }
      ],
      projects: [
        { name: "Real-time Chat App", description: "WebSocket chat with async Python.", tech: "FastAPI, WebSockets" },
        { name: "AI Image Classifier", description: "Deploy a CNN model with TensorFlow.", tech: "TensorFlow, Docker" }
      ]
    }
  };

  // Helper to render topics
  function renderTopics(levelKey) {
    const container = document.getElementById('topicsContainer');
    const data = jsonData[levelKey];
    if (!data || !data.topics) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> No topics found.</div>';
      return;
    }
    container.innerHTML = data.topics.map(topic => `
      <div class="topic-card">
        <div class="topic-icon"><i class="${topic.icon}"></i></div>
        <h3>${topic.title}</h3>
        <p>${topic.desc}</p>
        <span class="topic-duration"><i class="far fa-clock"></i> ${topic.duration}</span>
      </div>
    `).join('');
  }

  function renderProjects(levelKey) {
    const container = document.getElementById('projectsContainer');
    const data = jsonData[levelKey];
    if (!data || !data.projects) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-flask"></i> Sample projects coming soon</div>';
      return;
    }
    container.innerHTML = data.projects.map(proj => `
      <div class="project-card">
        <h4><i class="fas fa-rocket"></i> ${proj.name}</h4>
        <p>${proj.description}</p>
        <span class="project-tech"><i class="fas fa-microchip"></i> ${proj.tech}</span>
      </div>
    `).join('');
  }

  let currentLevel = 'beginner';

  function loadLevel(level) {
    currentLevel = level;
    renderTopics(level);
    renderProjects(level);
    // update active tab UI
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if(btn.getAttribute('data-level') === level) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  // Tab event listeners
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const level = btn.getAttribute('data-level');
      if(level) loadLevel(level);
    });
  });

  // initial load beginner
  loadLevel('beginner');

  // ----- AI Modal: Lazy load AI JS only when clicked (optional button at bottom-right)
  // The requirement: "Optional AI button at bottom-right to open AI modal (only loads AI JS when clicked)"
  // We will implement dynamic script loading for AI logic (simulate AI module)
  let aiScriptLoaded = false;

  function loadAIScript() {
    return new Promise((resolve) => {
      if (aiScriptLoaded) {
        resolve();
        return;
      }
      // Simulate loading external AI JS (we'll create inline AI functionality but to mimic requirement)
      // Actually we can define a function that adds AI capabilities and mark loaded.
      // But the requirement says "only loads AI JS when clicked" — so we create a script dynamically.
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@neopy/ai-assistant@1.0.0/mock.js'; // placeholder external URL
      // but for demo we provide fallback inline AI, but to respect lazy load we attach a custom AI module.
      // We'll define a robust AI feature inside the loaded flag and attach event.
      script.onload = () => {
        console.log('AI JS loaded externally (mock)');
        resolve();
      };
      script.onerror = () => {
        console.warn('External AI JS failed, using built-in AI helper');
        // built-in fallback
        resolve();
      };
      document.head.appendChild(script);
      aiScriptLoaded = true;
      // also define window.AIHelper if not present after timeout
      setTimeout(() => {
        if(!window.NeopyAI) {
          window.NeopyAI = {
            getRecommendation: (level) => {
              return `✨ Based on your ${level} level, we recommend focusing on core projects and daily coding practice. Try building a mini-project! ✨`;
            }
          };
        }
        resolve();
      }, 200);
    });
  }

  const aiFab = document.getElementById('aiFabBtn');
  const aiModal = document.getElementById('aiModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const askAIButton = document.getElementById('askAIButton');
  const aiResponseArea = document.getElementById('aiResponseArea');

  // open modal
  aiFab.addEventListener('click', async () => {
    // Lazy load AI JS only when clicked
    await loadAIScript();
    aiModal.classList.add('active');
  });

  function closeModal() {
    aiModal.classList.remove('active');
  }

  closeModalBtn.addEventListener('click', closeModal);
  aiModal.addEventListener('click', (e) => {
    if(e.target === aiModal) closeModal();
  });

  // AI interaction after script load (simulate intelligent response)
  askAIButton.addEventListener('click', async () => {
    // ensure AI scripts are loaded (they might have been loaded on modal open)
    if(!aiScriptLoaded) {
      await loadAIScript();
    }
    aiResponseArea.innerHTML = '<div class="loading-spinner"></div> Analyzing your learning path...';
    // Simulate AI response based on current level and some smart text
    setTimeout(() => {
      let levelName = currentLevel === 'beginner' ? 'Beginner' : (currentLevel === 'intermediate' ? 'Intermediate' : 'Pro');
      let suggestions = '';
      if(currentLevel === 'beginner') {
        suggestions = 'Start with Python fundamentals, practice mini-games, and focus on problem-solving. I recommend the "Calculator App" project to solidify syntax.';
      } else if(currentLevel === 'intermediate') {
        suggestions = 'Deepen OOP, master API integrations, and build a portfolio project like a Weather Dashboard. Consider learning Flask for backend.';
      } else {
        suggestions = 'Explore concurrency, ML deployment, and cloud. Try the Real-time Chat App project to showcase advanced async skills!';
      }
      aiResponseArea.innerHTML = `<i class="fas fa-robot" style="color: var(--orange);"></i> <strong>AI Mentor says:</strong> ${suggestions}<br><br><i class="fas fa-lightbulb"></i> Keep coding consistently!`;
    }, 800);
  });

  // optional: preload basic but no AI heavy code before click
  console.log('Courses page ready — AI JS lazy loaded on demand');
  
  // additional for JSON fetch simulation: In real scenario use fetch, but we already used inline data.
  // Requirement: Beginner.json, intermediate.json, pro.json are separate. For full compliance, we simulate asynchronous fetching
  // but we can also replace load with fetch. To be robust, I'll override loadLevel to fetch from JSON files?
  // Actually the requirement: "Each section loads topics dynamically from JSON (beginner.json, intermediate.json, pro.json)."
  // So we must fetch from those endpoints. We'll refactor loadLevel to use fetch API with those json files.
  // We'll keep the existing data but use fetch to be fully compliant. Since we are in a sandbox, we will attempt fetch but fallback to inline.
  // That ensures demonstration works even without actual files. But we create a dynamic fetch that merges.
  
  async function fetchTopicsAndProjects(level) {
    try {
      const response = await fetch(`${level}.json`);
      if (!response.ok) throw new Error('JSON not found, using embedded fallback');
      const data = await response.json();
      return data;
    } catch (err) {
      console.warn(`Falling back to embedded data for ${level}.json`);
      return jsonData[level];
    }
  }
  
  async function loadLevelFromJSON(level) {
    currentLevel = level;
    const data = await fetchTopicsAndProjects(level);
    if (data && data.topics) {
      const container = document.getElementById('topicsContainer');
      container.innerHTML = data.topics.map(topic => `
        <div class="topic-card">
          <div class="topic-icon"><i class="${topic.icon || 'fas fa-code'}"></i></div>
          <h3>${topic.title}</h3>
          <p>${topic.desc}</p>
          <span class="topic-duration"><i class="far fa-clock"></i> ${topic.duration || '~2h'}</span>
        </div>
      `).join('');
    } else {
      document.getElementById('topicsContainer').innerHTML = '<div class="empty-state">Unable to load topics</div>';
    }
    if (data && data.projects) {
      const projContainer = document.getElementById('projectsContainer');
      projContainer.innerHTML = data.projects.map(proj => `
        <div class="project-card">
          <h4><i class="fas fa-rocket"></i> ${proj.name}</h4>
          <p>${proj.description}</p>
          <span class="project-tech"><i class="fas fa-microchip"></i> ${proj.tech || 'Python'}</span>
        </div>
      `).join('');
    } else {
      document.getElementById('projectsContainer').innerHTML = '<div class="empty-state">Sample projects will appear soon</div>';
    }
    // update active tab UI
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if(btn.getAttribute('data-level') === level) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }
  
  // Override tab click to use fetch method
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', (e) => {
      const level = newBtn.getAttribute('data-level');
      if(level) loadLevelFromJSON(level);
    });
  });
  
  // initial load beginner via fetch
  loadLevelFromJSON('beginner');
</script>
</body>
</html>
